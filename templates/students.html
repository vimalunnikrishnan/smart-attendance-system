<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 15px;
    }

    table {
        width: 85%;
        margin: auto;
        border-collapse: collapse;
        background: white;
        font-size: 14px;
    }

    th, td {
        padding: 6px 8px;   /* 🔽 smaller cells */
        border: 1px solid #ddd;
        text-align: center;
    }

    th {
        background: #007bff;
        color: white;
    }

    td a {
        font-size: 13px;
        padding: 3px 6px;
        text-decoration: none;
        border-radius: 4px;
    }

    td a:first-child {
        background: #ffc107;
        color: black;
    }

    td a:last-child {
        background: #dc3545;
        color: white;
    }

    .back {
        display: block;
        width: 120px;
        margin: 15px auto;
        padding: 6px;
        text-align: center;
        background: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }
</style>

</head>
<body>

<h2 style="text-align:center;">Students List</h2>

<table>
    <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Roll No</th>
    <th>Department</th>
    <th>Actions</th>
</tr>

    {% for s in students %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>
        <a href="/edit_student/{{ s[0] }}">✏ Edit</a> |
        <a href="/delete_student/{{ s[0] }}"
           onclick="return confirm('Are you sure?')">🗑 Delete</a>
    </td>
</tr>
{% endfor %}

</table>

<a href="/admin" class="back">⬅ Back</a>

</body>
</html>
