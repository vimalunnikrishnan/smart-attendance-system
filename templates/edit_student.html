<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 40px; }
        form {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<form method="POST">
    <h3>Edit Student</h3>
    <input type="text" name="name" value="{{ student[1] }}" required>
    <input type="text" name="roll_no" value="{{ student[2] }}" required>
    <input type="text" name="department" value="{{ student[3] }}" required>
    <button type="submit">Update</button>
</form>

</body>
</html>
