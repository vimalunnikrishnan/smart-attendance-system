{% extends "base.html" %}
{% block content %}

<div style="padding:40px;">

    <h2>
        Mark Attendance  
        (Period {{ period.period_number }} |
        {{ period.subject.subject_name }} |
        {{ period.date }})
    </h2>

    <form method="POST">

        <table style="width:100%; border-collapse:collapse;">
            <tr>
                <th style="border:1px solid #ddd; padding:10px;">Roll No</th>
                <th style="border:1px solid #ddd; padding:10px;">Name</th>
                <th style="border:1px solid #ddd; padding:10px;">Present</th>
                <th style="border:1px solid #ddd; padding:10px;">Absent</th>
            </tr>

            {% for student in students %}
            <tr>
                <td style="border:1px solid #ddd; padding:10px;">
                    {{ student.roll_number }}
                </td>
                <td style="border:1px solid #ddd; padding:10px;">
                    {{ student.name }}
                </td>
                <td style="border:1px solid #ddd; padding:10px;">
                    <input type="radio"
                           name="status_{{ student.id }}"
                           value="Present" required>
                </td>
                <td style="border:1px solid #ddd; padding:10px;">
                    <input type="radio"
                           name="status_{{ student.id }}"
                           value="Absent" required>
                </td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit"
                style="margin-top:20px; padding:10px 20px; background:green; color:white; border:none;">
            Save Attendance
        </button>

    </form>

</div>

{% endblock %}
